<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marz — Patient History</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav class="navbar">
    <h1>Marz</h1>
    <div>
        <a href="visit.html">New Visit</a>
        <a href="history.html">Patient History</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Patient History Lookup</h2>
        <div style="display:flex; gap:12px; align-items:center;">
            <input type="text" id="search-name"
                placeholder="Enter patient name..."
                style="flex:1; max-width:360px;">
            <button class="btn btn-primary" onclick="loadHistory()">
                Search
            </button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <div id="results"></div>
</div>

<script type="module">
import { getPatientHistory } from "./js/api.js";

window.loadHistory = async function() {
    const name = document.getElementById("search-name").value.trim();
    const status = document.getElementById("status");
    const results = document.getElementById("results");

    if (!name) return;

    status.className = "status loading";
    status.textContent = "Searching...";
    results.innerHTML = "";

    try {
        const data = await getPatientHistory(name);

        if (data.error) {
            status.className = "status error";
            status.textContent = "No patient found with that name.";
            return;
        }

        status.className = "status success";
        status.textContent = `Found ${data.total_visits} visit(s) for ${data.patient_name}.`;

        results.innerHTML = data.visits.map((v, i) => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h2 style="border:none; padding:0; margin:0;">Visit ${data.total_visits - i}</h2>
                    <span class="badge">${v.date}</span>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                    <div>
                        <label style="font-size:12px; color:#718096;">Symptoms</label>
                        <p style="font-size:14px; margin-top:4px;">${v.symptoms || "—"}</p>
                    </div>
                    <div>
                        <label style="font-size:12px; color:#718096;">Observations</label>
                        <p style="font-size:14px; margin-top:4px;">${v.observations || "—"}</p>
                    </div>
                    <div>
                        <label style="font-size:12px; color:#718096;">Lab results</label>
                        <p style="font-size:14px; margin-top:4px;">${v.lab_results || "—"}</p>
                    </div>
                </div>

                <label style="font-size:12px; color:#718096;">Diagnosis</label>
                <div class="report-box" style="margin-top:8px; max-height:200px;">
${v.diagnosis || "No diagnosis recorded."}</div>
            </div>
        `).join("");

    } catch (err) {
        status.className = "status error";
        status.textContent = "Error: " + err.message;
    }
}
</script>
</body>
</html>
