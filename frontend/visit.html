<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marz — New Visit</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav class="navbar">
    <h1>Marz</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>New Patient Visit</h2>
        <form id="visit-form">
            <div class="form-grid">

                <div class="form-group">
                    <label for="patient_name">Patient name</label>
                    <input type="text" id="patient_name" placeholder="Full name" required>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" placeholder="Years" required>
                </div>

                <div class="form-group full-width">
                    <label for="symptoms">Symptoms</label>
                    <textarea id="symptoms" placeholder="Describe the patient's symptoms..." required></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="observations">Doctor observations</label>
                    <textarea id="observations" placeholder="Clinical findings, vitals, physical exam..."></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="lab_results">Lab results</label>
                    <textarea id="lab_results" placeholder="Blood tests, imaging, diagnostics..."></textarea>
                </div>

            </div>

            <div style="margin-top: 24px; display: flex; align-items: center; gap: 16px;">
                <button type="submit" id="submit-btn" class="btn btn-primary">
                    Generate Report
                </button>
                <button type="button" class="btn btn-secondary"
                    onclick="document.getElementById('visit-form').reset()">
                    Clear
                </button>
            </div>

            <div id="status" class="status"></div>
        </form>
    </div>
</div>

<script type="module" src="js/visit-form.js"></script>
</body>
</html>
